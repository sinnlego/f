<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>飞行员模拟器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', Roboto, system-ui, sans-serif; }
        body { background: #0b0f17; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 8px; }
        .card {
            max-width: 560px; width: 100%; background: #141b2b; border-radius: 36px; padding: 18px 18px 20px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.7), inset 0 1px 1px rgba(255,255,255,0.06);
            border: 1px solid #253040; display: flex; flex-direction: column; gap: 10px;
        }
        .top-bar {
            display: flex; justify-content: space-between; align-items: center; background: #0e1524;
            border-radius: 60px; padding: 8px 18px 8px 20px; border: 1px solid #2e3c52;
        }
        .balance { display: flex; align-items: baseline; gap: 4px; }
        .balance .label { font-size: 14px; font-weight: 500; color: #8f9fc3; }
        .balance .value { font-size: 26px; font-weight: 700; color: #f2e7d3; line-height: 1; }
        .balance .value small { font-size: 14px; font-weight: 500; color: #95a5c9; margin-left: 3px; }
        .round-badge {
            background: #1f2b40; border-radius: 40px; padding: 4px 14px; border: 1px solid #3d4e6b;
            font-size: 15px; color: #c6d3f0; white-space: nowrap; display: flex; align-items: center; gap: 6px;
        }
        .round-badge .random-users {
            color: #f5c85e; font-weight: 700;
        }

        .multiplier-panel {
            background: #0f1625; border-radius: 48px; padding: 12px 8px 12px; border: 1px solid #314159;
            box-shadow: inset 0 5px 8px rgba(0,0,0,0.6); text-align: center;
            position: relative;
        }
        .fly-label { font-size: 14px; font-weight: 500; letter-spacing: 1px; color: #6e81a8; text-transform: uppercase; margin-bottom: 2px; }
        .main-multiplier {
            font-size: 92px; font-weight: 800; line-height: 1; color: #deeaff;
            text-shadow: 0 0 12px #3a72ff66; display: flex; align-items: center; justify-content: center;
        }
        .main-multiplier span { font-size: 36px; margin-left: 6px; color: #95abcf; font-weight: 500; }
        .main-multiplier.red-boom { color: #ff607b !important; text-shadow: 0 0 22px #ff3366; }
        
        /* 消息区域 */
        .message-flash {
            font-size: 14px;
            font-weight: 600;
            padding: 6px 18px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 8px;
            transition: all 0.2s;
            border: 1px solid;
            min-width: 160px;
        }
        .message-flash.boom {
            background: #2d1f28;
            color: #ffa7b5;
            border-color: #ff7f9f;
        }
        .message-flash.cashout {
            background: #1b4a3d;
            color: #baffcf;
            border-color: #2bb573;
        }
        
        /* 倒计时条 - 用于起飞前等待 */
        .countdown-container {
            width: 100%;
            margin: 8px 0 4px;
            text-align: center;
            transition: opacity 0.2s;
        }
        .countdown-label {
            font-size: 13px;
            color: #b0c6ec;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .countdown-label span {
            color: #ffd966;
            font-weight: 600;
        }
        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: #1f2b40;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid #3d506e;
        }
        .progress-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #f6b868, #ffd966);
            border-radius: 20px;
            transition: width 0.1s linear;
        }

        .control-row {
            background: #0e1625; border-radius: 50px; padding: 8px 14px; display: flex;
            align-items: center; gap: 8px; border: 1px solid #334153; flex-wrap: wrap;
        }
        
        /* 投注输入框 */
        .bet-input-wrapper {
            background: #1e2b41;
            border-radius: 50px;
            padding: 4px 16px;
            border: 1px solid #475e86;
            display: flex;
            align-items: center;
            flex: 2;
            min-width: 140px;
        }
        .bet-input {
            background: transparent;
            border: none;
            color: white;
            font-size: 20px;
            font-weight: 700;
            width: 100px;
            text-align: right;
            outline: none;
        }
        .bet-input::placeholder {
            color: #5f7299;
            font-weight: 500;
            font-size: 16px;
        }
        .bet-input-suffix {
            color: #95a5c9;
            font-size: 14px;
            margin-left: 4px;
        }
        
        .stake-group {
            display: flex; background: #1a263b; border-radius: 50px; padding: 3px;
            border: 1px solid #415674; gap: 2px; flex-wrap: wrap;
        }
        .stake-btn {
            background: #121e33; border: none; color: white; font-weight: 600; font-size: 15px;
            padding: 5px 12px; border-radius: 40px; cursor: pointer; transition: 0.1s; min-width: 46px;
        }
        .stake-btn:hover { background: #2e4570; }
        
        /* 唯一的大按钮 */
        .action-button {
            width: 100%;
            background: #1f8b4c;
            border: none;
            border-radius: 60px;
            font-size: 36px;
            font-weight: 800;
            color: white;
            padding: 16px 8px;
            box-shadow: 0 6px 0 #0f532a, 0 4px 20px #27dd7670;
            transition: 0.08s;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 4px 0 6px;
        }
        .action-button:active { transform: translateY(5px); box-shadow: 0 1px 0 #0f532a, 0 4px 16px #27dd7670; }
        .action-button.cashout-mode {
            background: #d97706;
            box-shadow: 0 6px 0 #92400e, 0 4px 20px #fbbf2470;
        }
        .action-button:disabled {
            opacity: 0.4;
            transform: translateY(5px);
            box-shadow: 0 2px 0 #0f532a;
            pointer-events: none;
        }

        /* 充值相关 - 默认隐藏 */
        .recharge-toggle-area {
            display: flex;
            justify-content: flex-end;
            margin-top: 4px;
        }
        .toggle-recharge-btn {
            background: #253856;
            border: 1px solid #3f5577;
            color: #c1d3ff;
            font-size: 13px;
            padding: 6px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.1s;
        }
        .toggle-recharge-btn:hover {
            background: #2f4a72;
            color: white;
        }

        /* 充值面板 (默认隐藏) */
        .recharge-panel {
            background: #0f172a; border-radius: 50px; padding: 14px 18px; 
            display: flex; align-items: center; justify-content: space-between; 
            border: 1px solid #33435b; margin-top: 6px; gap: 8px; flex-wrap: wrap;
            transition: all 0.2s;
        }
        .recharge-panel.hidden {
            display: none;
        }
        .recharge-label {
            color: #8fa6d9; font-weight: 500; font-size: 14px; display: flex; align-items: center; gap: 4px;
        }
        .recharge-input {
            background: #1e2b41; border: 1px solid #475e86; border-radius: 60px; 
            padding: 8px 16px; color: white; font-size: 16px; width: 140px; outline: none;
        }
        .recharge-btn {
            background: #3b4e70; border: none; border-radius: 60px; padding: 8px 20px;
            color: white; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.1s;
            box-shadow: 0 3px 0 #1f2a3f; white-space: nowrap;
        }
        .recharge-btn:hover { background: #4f6b97; }
        .recharge-btn:active { transform: translateY(3px); box-shadow: none; }

        .footer-info {
            background: #0f172a; border-radius: 50px; padding: 10px 18px; display: flex;
            justify-content: space-between; align-items: center; border: 1px solid #33435b;
            color: #ccd9f1; font-size: 14px; margin-top: 4px;
        }
        .highest { background: #1e314a; border-radius: 30px; padding: 4px 14px; font-weight: 700; color: #feba5a; font-size: 14px; }
        .betters span { color: #75a9ff; font-weight: 700; }
        .footnote { text-align: center; color: #43587a; font-size: 12px; line-height: 1.2; }
    </style>
</head>
<body>
    <div class="card">
        <div class="top-bar">
            <div class="balance"><span class="label">余额</span><span class="value" id="balanceDisplay">0.00<small>CNY</small></span></div>
            <div class="round-badge">
                <span class="random-users" id="randomUsers">1,754</span> 下注
            </div>
        </div>
        
        <div class="multiplier-panel">
            <div class="fly-label">✈️ 飞行器 · 投注后等待3秒</div>
            <div class="main-multiplier" id="multiplierDisplay">0.00<span>x</span></div>
            <div id="messageFlash" class="message-flash boom" style="display: none;">💥 坠毁</div>
        </div>

        <!-- 倒计时条 - 仅用于起飞前等待 -->
        <div id="countdownContainer" class="countdown-container" style="display: none;">
            <div class="countdown-label">
                <span id="countdownMessage">⏳ 准备起飞</span> <span id="countdownNumber">3</span>秒
            </div>
            <div class="progress-bar-bg">
                <div id="progressFill" class="progress-fill" style="width: 100%;"></div>
            </div>
        </div>

        <!-- 输入行 -->
        <div class="control-row">
            <div class="bet-input-wrapper">
                <input type="number" id="betInput" class="bet-input" value="1.00" step="0.01" min="0.01" placeholder="1.00">
                <span class="bet-input-suffix">CNY</span>
            </div>
            <div class="stake-group">
                <button class="stake-btn" data-stake="1.00">1</button>
                <button class="stake-btn" data-stake="10">10</button>
                <button class="stake-btn" data-stake="20">20</button>
                <button class="stake-btn" data-stake="50">50</button>
                <button class="stake-btn" data-stake="100">100</button>
            </div>
        </div>

        <!-- 唯一动作按钮 -->
        <button class="action-button" id="actionBtn">投注</button>

        <!-- 充值入口按钮 (点击后显示充值面板) -->
        <div class="recharge-toggle-area">
            <button class="toggle-recharge-btn" id="toggleRechargeBtn">💳 充值</button>
        </div>

        <!-- 充值面板 (卡密：xiaoan = 2000) 默认隐藏 -->
        <div id="rechargePanel" class="recharge-panel hidden">
            <span class="recharge-label">🔑 卡密</span>
            <input type="text" id="cardCodeInput" class="recharge-input" placeholder="输入卡密" value="">
            <button class="recharge-btn" id="rechargeBtn">充值</button>
        </div>

        <!-- 底部信息 -->
        <div class="footer-info">
            <span>📊 当前下注</span>
            <span class="highest" id="highestDisplay">🏆 21,792.72x</span>
            <span class="betters" id="currentPlayersSpan">👥 <span>1754</span></span>
        </div>
        <div class="footnote">投注后等待3秒起飞</div>
    </div>

    <script>
        (function() {
            // --- 状态变量 ---
            let balance = 0.00;                // 余额改为0
            let currentBet = 1.00;
            let gameActive = false;             // 飞行中
            let waitingForTakeoff = false;       // 等待起飞倒计时中
            let crashed = false;                 // 是否已坠毁
            let multiplier = 0.00;
            let flightInterval = null;
            let crashTimer = null;
            let countdownInterval = null;         // 倒计时更新
            let takeoffTimer = null;               // 起飞延迟定时器
            let highestRecord = 21792.72;
            let stakedThisRound = 0;               // 本轮投注额
            let flightTime = 0;

            // 随机下注人数
            let currentPlayers = 1754;

            // 卡密常量 (硬编码)
            const VALID_CARD = "xiaoan";
            const RECHARGE_AMOUNT = 2000;

            // DOM 元素
            const balanceSpan = document.getElementById('balanceDisplay');
            const multDiv = document.getElementById('multiplierDisplay');
            const messageFlash = document.getElementById('messageFlash');
            const actionBtn = document.getElementById('actionBtn');
            const betInput = document.getElementById('betInput');
            const highestSpan = document.getElementById('highestDisplay');
            const stakeBtns = document.querySelectorAll('.stake-btn[data-stake]');
            const randomUsersSpan = document.getElementById('randomUsers');
            const currentPlayersSpan = document.querySelector('#currentPlayersSpan span');
            // 充值相关
            const toggleRechargeBtn = document.getElementById('toggleRechargeBtn');
            const rechargePanel = document.getElementById('rechargePanel');
            const cardCodeInput = document.getElementById('cardCodeInput');
            const rechargeBtn = document.getElementById('rechargeBtn');

            // 倒计时相关
            const countdownContainer = document.getElementById('countdownContainer');
            const countdownNumber = document.getElementById('countdownNumber');
            const countdownMessage = document.getElementById('countdownMessage');
            const progressFill = document.getElementById('progressFill');

            // --- 辅助函数 ---
            function refreshBalance() {
                let formatted = balance.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
                balanceSpan.innerHTML = formatted + '<small>CNY</small>';
            }

            function setMult(value) {
                multiplier = value;
                multDiv.innerHTML = value.toFixed(2) + '<span>x</span>';
            }

            // 更新随机下注人数
            function refreshRandomPlayers() {
                let newPlayers = Math.floor(Math.random() * 5000) + 1500;
                currentPlayers = newPlayers;
                randomUsersSpan.innerText = currentPlayers.toLocaleString();
                if (currentPlayersSpan) currentPlayersSpan.innerText = currentPlayers.toLocaleString();
            }

            // 获取投注额
            function getBetFromInput() {
                let val = parseFloat(betInput.value);
                if (isNaN(val) || val < 0.01) val = 0.01;
                val = Math.round(val * 100) / 100;
                betInput.value = val.toFixed(2);
                return val;
            }

            // 设置投注额
            function setBetAmount(amount) {
                if (gameActive || waitingForTakeoff) return;
                amount = Math.round(amount * 100) / 100;
                currentBet = amount;
                betInput.value = amount.toFixed(2);
                // 根据余额更新按钮状态
                if (!gameActive && !waitingForTakeoff && !crashed) {
                    actionBtn.disabled = (balance < currentBet);
                }
            }

            // 清除所有定时器
            function clearAllTimers() {
                if (flightInterval) { clearInterval(flightInterval); flightInterval = null; }
                if (crashTimer) { clearTimeout(crashTimer); crashTimer = null; }
                if (takeoffTimer) { clearTimeout(takeoffTimer); takeoffTimer = null; }
                if (countdownInterval) { clearInterval(countdownInterval); countdownInterval = null; }
            }

            // 隐藏倒计时
            function hideCountdown() {
                countdownContainer.style.display = 'none';
                if (countdownInterval) clearInterval(countdownInterval);
                countdownInterval = null;
            }

            // 通用倒计时函数
            function startCountdown(duration, message, callback) {
                countdownContainer.style.display = 'block';
                countdownMessage.innerText = message;
                let timeLeft = duration;
                countdownNumber.innerText = timeLeft.toFixed(1);
                progressFill.style.width = '100%';

                if (countdownInterval) clearInterval(countdownInterval);
                
                const startTime = Date.now();
                countdownInterval = setInterval(() => {
                    const elapsed = (Date.now() - startTime) / 1000;
                    timeLeft = Math.max(0, duration - elapsed);
                    countdownNumber.innerText = timeLeft.toFixed(1);
                    
                    const percent = (timeLeft / duration) * 100;
                    progressFill.style.width = percent + '%';

                    if (timeLeft <= 0) {
                        clearInterval(countdownInterval);
                        countdownInterval = null;
                        hideCountdown();
                        if (callback) callback();
                    }
                }, 100);
            }

            // 显示消息
            function showMessage(text, isCashout = false) {
                messageFlash.innerText = text;
                messageFlash.style.display = 'inline-block';
                if (isCashout) {
                    messageFlash.classList.remove('boom');
                    messageFlash.classList.add('cashout');
                } else {
                    messageFlash.classList.remove('cashout');
                    messageFlash.classList.add('boom');
                }
                const duration = isCashout ? 2000 : 1600;
                setTimeout(() => {
                    messageFlash.style.display = 'none';
                }, duration);
            }

            // --- 核心逻辑 ---

            // 开始飞行 (倒计时结束后调用)
            function startFlight() {
                gameActive = true;
                waitingForTakeoff = false;
                crashed = false;
                flightTime = 0;
                multDiv.classList.remove('red-boom');
                
                // 按钮变为“兑现”
                actionBtn.innerText = '兑现';
                actionBtn.classList.add('cashout-mode');
                actionBtn.disabled = false;
                betInput.disabled = true;      // 飞行中不能改金额

                setMult(0.00);

                // 随机坠毁点
                const crashPoint = Math.max(1.15, 1.0 + Math.random() * 14);
                const baseStep = 0.03;

                if (flightInterval) clearInterval(flightInterval);
                if (crashTimer) clearTimeout(crashTimer);

                flightInterval = setInterval(() => {
                    if (!gameActive || crashed) return;
                    
                    flightTime++;
                    
                    let dynamicStep = baseStep + 0.000045 * flightTime * flightTime;
                    if (dynamicStep > 0.5) dynamicStep = 0.5;
                    
                    let newVal = multiplier + dynamicStep;
                    
                    if (newVal >= crashPoint) {
                        setMult(crashPoint);
                        clearInterval(flightInterval);
                        flightInterval = null;
                        handleCrash();  // 坠毁
                    } else {
                        setMult(newVal);
                    }
                }, 85);

                crashTimer = setTimeout(() => {
                    if (gameActive && !crashed) {
                        clearInterval(flightInterval);
                        flightInterval = null;
                        handleCrash();
                    }
                }, 20000);
            }

            // 处理投注
            function handleBet() {
                if (gameActive || waitingForTakeoff) return;

                const bet = getBetFromInput();
                setBetAmount(bet);

                if (balance < currentBet) {
                    alert('余额不足');
                    actionBtn.disabled = true;
                    return;
                }

                // 扣除投注额
                balance -= currentBet;
                stakedThisRound = currentBet;
                refreshBalance();

                // 刷新随机人数
                refreshRandomPlayers();

                // 进入等待起飞状态
                waitingForTakeoff = true;
                actionBtn.disabled = true;      // 等待期间按钮不可用
                betInput.disabled = true;        // 不能改金额

                // 开始3秒倒计时，结束后起飞
                startCountdown(3, '⏳ 准备起飞', () => {
                    waitingForTakeoff = false;
                    startFlight();
                });

                // 后备定时器
                takeoffTimer = setTimeout(() => {
                    if (waitingForTakeoff) {
                        waitingForTakeoff = false;
                        hideCountdown();
                        startFlight();
                    }
                }, 3000);
            }

            // 处理兑现
            function handleCashout() {
                if (!gameActive || crashed) return;

                const winTotal = stakedThisRound * multiplier;
                balance += winTotal;
                refreshBalance();

                if (multiplier > highestRecord) {
                    highestRecord = multiplier;
                    highestSpan.innerText = '🏆 ' + highestRecord.toFixed(2) + 'x';
                }

                showMessage(`✅ 兑现 ${winTotal.toFixed(2)} CNY`, true);

                // 兑现后禁用按钮，等待坠毁（或继续飞行但不做操作）
                actionBtn.disabled = true;
                // 注意：不改变gameActive，飞行继续，但兑现按钮已禁用，不能再次兑现
            }

            // 处理坠毁
            function handleCrash() {
                gameActive = false;
                crashed = true;
                waitingForTakeoff = false;
                
                // 按钮恢复为“投注”
                actionBtn.innerText = '投注';
                actionBtn.classList.remove('cashout-mode');
                actionBtn.disabled = (balance < currentBet);
                betInput.disabled = false;

                multDiv.classList.add('red-boom');
                
                // 仅显示坠毁消息，没有自动倒计时或自动投注
                showMessage('💥 坠毁', false);

                // 清除可能残留的定时器
                // 无任何自动续投逻辑
            }

            // --- 充值功能 (面板切换 + 充值) ---
            function toggleRechargePanel() {
                if (rechargePanel.classList.contains('hidden')) {
                    rechargePanel.classList.remove('hidden');
                } else {
                    rechargePanel.classList.add('hidden');
                    // 可选：隐藏时清空输入
                    cardCodeInput.value = '';
                }
            }

            function handleRecharge() {
                const enteredCode = cardCodeInput.value.trim();
                if (enteredCode === VALID_CARD) {
                    balance += RECHARGE_AMOUNT;
                    refreshBalance();
                    showMessage(`💰 充值成功 +${RECHARGE_AMOUNT} CNY`, true); // 复用绿色样式
                    cardCodeInput.value = '';   // 清空输入
                    // 如果当前没有游戏且余额充足，启用投注按钮
                    if (!gameActive && !waitingForTakeoff && !crashed) {
                        actionBtn.disabled = (balance < currentBet);
                    }
                    // 充值成功后自动隐藏面板（可选）
                    rechargePanel.classList.add('hidden');
                } else {
                    alert('卡密无效，请重试');
                }
            }

            // --- 事件绑定 ---
            actionBtn.addEventListener('click', () => {
                if (gameActive && !crashed) {
                    handleCashout();
                } else {
                    handleBet();
                }
            });

            betInput.addEventListener('input', () => {
                if (!gameActive && !waitingForTakeoff) {
                    const val = getBetFromInput();
                    setBetAmount(val);
                } else {
                    betInput.value = currentBet.toFixed(2);
                }
            });

            stakeBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    if (gameActive || waitingForTakeoff) return;
                    const stake = parseFloat(e.target.getAttribute('data-stake'));
                    setBetAmount(stake);
                });
            });

            // 充值切换按钮
            toggleRechargeBtn.addEventListener('click', toggleRechargePanel);

            // 充值按钮
            rechargeBtn.addEventListener('click', handleRecharge);
            // 可选：按回车触发充值
            cardCodeInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') handleRecharge();
            });

            // 初始化
            function init() {
                refreshBalance();                // 现在余额为0.00
                setMult(0.00);
                highestSpan.innerText = '🏆 ' + highestRecord.toFixed(2) + 'x';
                setBetAmount(1.00);
                hideCountdown();
                betInput.disabled = false;
                actionBtn.innerText = '投注';
                actionBtn.classList.remove('cashout-mode');
                actionBtn.disabled = (balance < currentBet); // 余额0，按钮禁用
                refreshRandomPlayers();
                messageFlash.style.display = 'none';
                cardCodeInput.value = '';
                // 确保充值面板初始隐藏
                rechargePanel.classList.add('hidden');
            }

            init();

            // 清理未使用的变量
            let autoRestartTimer; // 声明但未使用，避免引用错误（兼容旧代码）
        })();
    </script>
